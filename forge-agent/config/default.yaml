llm:
  provider: deepseek
  model: deepseek-v4-flash # 或 deepseek-v4-pro
  api_key: ${DEEPSEEK_API_KEY} # 在终端 export DEEPSEEK_API_KEY=你的key
  base_url: https://api.deepseek.com
  max_tokens: 8192

agent:
  max_steps: 40
  budget_tokens: 80000
  log_dir: ./logs

tools:
  shell:
    timeout: 30 # 秒
    max_output_tokens: 8000 # 截断长度
  file:
    max_view_lines: 100 # view 命令每次显示行数

context:
  repo_map_budget: 8000 # repo-map 最大 token 数
  history_window: 20 # 保留最近 N 轮对话
